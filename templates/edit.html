{% extends "base.html" %}

{% block title %}Edit Post - My Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Edit Post</h1>
    
    <form method="POST" class="blog-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" required value="{{ post.title }}">
        </div>

        <div class="form-group">
            <label for="author">Author Name</label>
            <input type="text" id="author" name="author" value="{{ post.author }}">
        </div>

        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea id="content" name="content" required rows="15">{{ post.content }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Post</button>
            <a href="{{ url_for('view_post', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
