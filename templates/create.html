{% extends "base.html" %}

{% block title %}Create New Post - My Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create New Post</h1>
    
    <form method="POST" class="blog-form">
        <div class="form-group">
            <label for="title">Post Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter post title">
        </div>

        <div class="form-group">
            <label for="author">Author Name</label>
            <input type="text" id="author" name="author" placeholder="Your name" value="Admin">
        </div>

        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea id="content" name="content" required placeholder="Write your post content here..." rows="15"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish Post</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
